<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--or:#FF6B00;--or2:#FF8C33;--blk:#0A0A0A;--brd:#2E2E2E;--txt:#F5F0E8;--muted:#9A9A9A;}
html,body{background:var(--blk);min-height:100vh;font-family:'Nunito',sans-serif;}
#bg-layer{position:fixed;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;transition:background-image 0.5s ease;z-index:0;}
#bg-overlay{position:fixed;inset:0;background:linear-gradient(to bottom,rgba(10,10,10,0.78) 0%,rgba(10,10,10,0.55) 35%,rgba(10,10,10,0.90) 100%);z-index:1;}
#app{position:relative;z-index:2;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:2.5rem;}
.header{background:rgba(10,10,10,0.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:2px solid var(--or);padding:1.2rem 1rem 0.8rem;position:sticky;top:0;z-index:100;}
.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:0.9rem;}
.logo-icon{width:52px;height:52px;border-radius:12px;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:4px 4px 0 rgba(0,0,0,0.7),0 0 0 1px var(--or2);}
.logo-icon img{width:100%;height:100%;object-fit:contain;display:block;}
.logo-text h1{font-family:'Bebas Neue',sans-serif;font-size:27px;color:var(--txt);letter-spacing:2.5px;line-height:1;}
.logo-text span{font-size:10px;color:var(--or);letter-spacing:3px;text-transform:uppercase;font-weight:700;}
.lang-row{display:flex;gap:7px;}
.lang-btn{background:rgba(255,255,255,0.06);border:1px solid var(--brd);color:var(--muted);padding:5px 13px;border-radius:20px;font-size:11px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;letter-spacing:0.5px;transition:all 0.18s;}
.lang-btn.active{background:var(--or);border-color:var(--or);color:#000;box-shadow:2px 2px 0 rgba(0,0,0,0.6);}
.lang-btn:not(.active):hover{border-color:var(--or2);color:var(--or2);}
.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding:0.8rem 1rem;background:rgba(10,10,10,0.65);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,107,0,0.18);scrollbar-width:none;position:sticky;top:102px;z-index:99;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-btn{background:rgba(255,255,255,0.06);border:1px solid var(--brd);color:var(--muted);padding:6px 16px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all 0.22s;flex-shrink:0;}
.cat-btn.active{background:var(--or);border-color:var(--or);color:#000;box-shadow:0 2px 14px rgba(255,107,0,0.45);}
.cat-btn:not(.active):hover{border-color:var(--or2);color:var(--or2);}
.bg-label{display:flex;align-items:center;gap:8px;padding:0.7rem 1rem 0;font-size:10px;color:rgba(255,255,255,0.38);letter-spacing:2px;text-transform:uppercase;font-weight:700;}
.bg-dot{width:6px;height:6px;background:var(--or);border-radius:50%;flex-shrink:0;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}
.section-label{padding:1.2rem 1rem 0.35rem;font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--or);letter-spacing:3.5px;}
.menu-wrap{padding:0 0.7rem;}
.menu-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.menu-table thead tr{background:rgba(20,20,20,0.92);}
.menu-table th{font-size:11px;font-weight:800;color:var(--or);letter-spacing:2px;text-transform:uppercase;padding:9px 10px;text-align:left;border-bottom:1px solid var(--brd);}
.menu-table th.th-price{text-align:right;}
.menu-table th.th-img{text-align:center;}
.menu-table td{padding:10px 9px;vertical-align:middle;border-bottom:1px solid rgba(46,46,46,0.55);}
.menu-table tr:last-child td{border-bottom:none;}
.menu-table tbody tr{background:rgba(12,12,12,0.78);transition:background 0.15s;}
.menu-table tbody tr:nth-child(even){background:rgba(22,22,22,0.78);}
.menu-table tbody tr:hover td{background:rgba(255,107,0,0.09);}
.col-name{width:55%;}
.col-price{width:20%;}
.col-img{width:25%;}
.item-name{font-weight:800;font-size:14px;color:var(--txt);display:flex;align-items:flex-start;gap:7px;line-height:1.35;}
.item-dot{width:7px;height:7px;background:var(--or);border-radius:2px;flex-shrink:0;margin-top:4px;box-shadow:1px 1px 0 #000;}
.item-price{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--or2);text-align:right;white-space:nowrap;letter-spacing:1px;}
.item-img-wrap{display:flex;align-items:center;justify-content:center;}
.item-img{width:58px;height:58px;border-radius:10px;object-fit:cover;border:2px solid var(--brd);box-shadow:2px 2px 0 rgba(0,0,0,0.6);transition:transform 0.2s ease,border-color 0.2s ease;display:block;}
.item-img:hover{transform:scale(1.08);border-color:var(--or);}
.item-img-placeholder{width:58px;height:58px;border-radius:10px;background:rgba(255,107,0,0.08);border:2px dashed var(--brd);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);letter-spacing:1px;text-align:center;line-height:1.3;}
.badge{display:inline-block;font-size:9px;font-weight:800;padding:1px 7px;border-radius:10px;letter-spacing:1px;vertical-align:middle;margin-left:4px;}
.badge-hot{background:#CC2200;color:#fff;}
.footer-bar{text-align:center;padding:2rem 1rem 1rem;font-size:12px;color:rgba(200,190,180,0.4);letter-spacing:1px;line-height:2;}
.footer-bar strong{color:var(--or);font-weight:800;}
/* ── LIGHTBOX ── */
#lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:center;justify-content:center;cursor:zoom-out;}
#lightbox.open{display:flex;}
#lightbox img{max-width:88vw;max-height:82vh;border-radius:16px;border:2px solid var(--or);box-shadow:0 0 60px rgba(255,107,0,0.35);object-fit:contain;cursor:default;animation:lbIn 0.22s ease;}
@keyframes lbIn{from{transform:scale(0.82);opacity:0;}to{transform:scale(1);opacity:1;}}
#lb-close{position:fixed;top:18px;right:20px;background:var(--or);color:#000;border:none;border-radius:50%;width:38px;height:38px;font-size:20px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 rgba(0,0,0,0.5);z-index:10000;line-height:1;}
</style>

const CATS={
  sq:{all:'— Të gjitha —',burger:'Burger',sandwich:'Sandwich',doner:'Doner',pjate:'Pjata',crepe:'Krep',pije:'Pije'},
  en:{all:'— All —',    burger:'Burger',sandwich:'Sandwich',doner:'Doner',pjate:'Plates',crepe:'Crepe',pije:'Drinks'},
  it:{all:'— Tutti —', burger:'Burger',sandwich:'Sandwich',doner:'Doner',pjate:'Piatti',crepe:'Crepe',pije:'Bevande'},
  fr:{all:'— Tout —',  burger:'Burger',sandwich:'Sandwich',doner:'Doner',pjate:'Plats', crepe:'Crepe',pije:'Boissons'},
};
const COLS={sq:['Emri','Çmimi'],en:['Name','Price'],it:['Nome','Prezzo'],fr:['Nom','Prix']};
const SLOGANS={sq:'Çdo kafshim, kënaqësi!',en:'Every bite, a reason to smile!',it:'Ogni morso, un sorriso!',fr:'Chaque bouchee, un sourire!'};

let lang='sq', activeCat='all';
const catOrder=[{key:'burger'},{key:'sandwich'},{key:'doner'},{key:'pjate'},{key:'crepe'},{key:'pije'}];

function getName(item){
  var map={sq:SQ,en:null,it:IT,fr:FR}[lang];
  return map?map[item.id]:item.en;
}
function setBg(cat){document.getElementById('bg-layer').style.backgroundImage='url('+(IMGS[cat]||IMGS.all)+')';document.getElementById('bg-label-txt').textContent=BG_LABELS[cat]||BG_LABELS.all;}
function setLang(l){lang=l;document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('onclick').includes("'"+l+"'"));});updateCatLabels();render();}
function setcat(c){activeCat=c;document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active');});document.getElementById('cat-'+c).classList.add('active');setBg(c);updateCatLabels();render();}
function updateCatLabels(){
  var cats=CATS[lang];
  Object.keys(cats).forEach(function(k){var el=document.getElementById('cat-'+k);if(el)el.textContent=cats[k];});
  document.getElementById('footer-slogan').textContent=SLOGANS[lang];
}
function imgHtml(src){
  return '<div class="item-img-wrap"><img class="item-img" src="'+src+'" alt="" onclick="openLb(\''+src+'\')" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'" loading="lazy" style="cursor:zoom-in"><div class="item-img-placeholder" style="display:none">FOTO</div></div>';
}
function render(){
  var cols=COLS[lang];
  var cats=CATS[lang];
  var groups=activeCat==='all'?catOrder:catOrder.filter(function(g){return g.key===activeCat;});
  var html='';
  groups.forEach(function(g){
    var items=ITEMS.filter(function(i){return i.cat===g.key;});
    if(!items.length)return;
    html+='<div class="section-label">'+cats[g.key]+'</div>';
    html+='<div class="menu-wrap"><table class="menu-table"><thead><tr><th class="col-name">'+cols[0]+'</th><th class="col-price th-price">'+cols[1]+'</th><th class="col-img th-img"></th></tr></thead><tbody>';
    items.forEach(function(item){
      var b=item.badge==='hot'?'<span class="badge badge-hot">HOT</span>':'';
      var name=getName(item);
      html+='<tr><td><div class="item-name"><span class="item-dot"></span><div>'+name+(b?' '+b:'')+'</div></div></td><td><div class="item-price">'+item.price+'</div></td><td>'+imgHtml(item.img)+'</td></tr>';
    });
    html+='</tbody></table></div>';
  });
  document.getElementById('menu-root').innerHTML=html;
}
setBg('all');render();
function openLb(src){var lb=document.getElementById('lightbox');document.getElementById('lb-img').src=src;lb.classList.add('open');document.body.style.overflow='hidden';}
function closeLb(e){if(e.target===document.getElementById('lightbox')){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}}
document.getElementById('lb-close').addEventListener('click',function(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';});
</script>
<div id="lightbox" onclick="closeLb(event)">
  <button id="lb-close" onclick="document.getElementById('lightbox').classList.remove('open')">✕</button>
  <img id="lb-img" src="" alt="">
</div>
<div id="intro-screen" style="position:fixed;inset:0;z-index:99999;background:#0A0A0A;display:flex;align-items:center;justify-content:center;pointer-events:none;">
  <canvas id="intro-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
</div>

<script>
(function(){
  var screen=document.getElementById('intro-screen');
  var canvas=document.getElementById('intro-canvas');
  var ctx=canvas.getContext('2d');
  var W=canvas.width=window.innerWidth;
  var H=canvas.height=window.innerHeight;

  var PHASE_SCATTER=0,PHASE_FORM=1,PHASE_HOLD=2,PHASE_WAVE=3,PHASE_DONE=4;
  var phase=PHASE_SCATTER;
  var phaseStart=0;

  var offC=document.createElement('canvas');
  offC.width=W;offC.height=H;
  var offCtx=offC.getContext('2d');
  offCtx.fillStyle='#0A0A0A';
  offCtx.fillRect(0,0,W,H);
  offCtx.textAlign='center';
  offCtx.textBaseline='middle';
  var fs=Math.min(W*0.18,110);
  offCtx.font='bold '+fs+'px Bebas Neue,sans-serif';
  offCtx.fillStyle='#fff';
  offCtx.fillText('SHKRELI',W/2,H/2-fs*0.1);
  offCtx.font='bold '+Math.round(fs*0.17)+'px Nunito,sans-serif';
  offCtx.fillStyle='#fff';
  offCtx.fillText('SHKODËR  ·  EST. 1995',W/2,H/2+fs*0.62);

  var imgData=offCtx.getImageData(0,0,W,H);
  var targets=[];
  var step=Math.max(2,Math.round(W/340));
  for(var y=0;y<H;y+=step){
    for(var x=0;x<W;x+=step){
      var idx=(y*W+x)*4;
      if(imgData.data[idx]>100) targets.push({tx:x,ty:y});
    }
  }

  var N=Math.min(targets.length,1800);
  var chosen=[];
  for(var k=0;k<N;k++) chosen.push(targets[Math.floor(Math.random()*targets.length)]);

  var particles=[];
  for(var i=0;i<N;i++){
    var t=chosen[i];
    var isOr=Math.random()<0.65;
    particles.push({
      x:Math.random()*W,
      y:Math.random()*H,
      tx:t.tx,ty:t.ty,
      vx:(Math.random()-0.5)*5,
      vy:(Math.random()-0.5)*5,
      r:Math.random()<0.3?2:1.2,
      color:isOr?(Math.random()<0.5?'#FF6B00':'#FF8C33'):'rgba(245,240,232,0.9)',
      waveOff:Math.random()*Math.PI*2,
      waveAmp:20+Math.random()*70,
      waveSpd:0.007+Math.random()*0.013,
      waveDir:Math.random()<0.5?-1:1
    });
  }

  var startTime=null;
  var SCATTER_DUR=600;
  var FORM_DUR=1500;
  var HOLD_DUR=900;
  var WAVE_DUR=1200;
  var TOTAL=SCATTER_DUR+FORM_DUR+HOLD_DUR+WAVE_DUR;

  function ease(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

  function animate(ts){
    if(!startTime)startTime=ts;
    var elapsed=ts-startTime;
    ctx.fillStyle='#0A0A0A';
    ctx.fillRect(0,0,W,H);

    if(phase===PHASE_SCATTER){
      var p=Math.min(elapsed/SCATTER_DUR,1);
      for(var i=0;i<N;i++){
        var b=particles[i];
        b.x+=b.vx;b.y+=b.vy;
        ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle=b.color;ctx.globalAlpha=0.3+p*0.5;ctx.fill();
      }
      ctx.globalAlpha=1;
      if(p>=1){phase=PHASE_FORM;phaseStart=elapsed;}

    }else if(phase===PHASE_FORM){
      var p=ease(Math.min((elapsed-phaseStart)/FORM_DUR,1));
      for(var i=0;i<N;i++){
        var b=particles[i];
        b.x=b.x+(b.tx-b.x)*p*0.11;
        b.y=b.y+(b.ty-b.y)*p*0.11;
        ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle=b.color;ctx.globalAlpha=0.6+p*0.4;ctx.fill();
      }
      ctx.globalAlpha=1;
      if(p>=0.995){
        for(var i=0;i<N;i++){particles[i].x=particles[i].tx;particles[i].y=particles[i].ty;}
        phase=PHASE_HOLD;phaseStart=elapsed;
      }

    }else if(phase===PHASE_HOLD){
      var p=Math.min((elapsed-phaseStart)/HOLD_DUR,1);
      for(var i=0;i<N;i++){
        var b=particles[i];
        var jitter=(1-p)*(Math.sin(elapsed*0.003+b.waveOff)*0.6);
        ctx.beginPath();ctx.arc(b.x+jitter,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle=b.color;ctx.globalAlpha=1;ctx.fill();
      }
      ctx.globalAlpha=1;
      if(p>=1){phase=PHASE_WAVE;phaseStart=elapsed;}

    }else if(phase===PHASE_WAVE){
      var p=Math.min((elapsed-phaseStart)/WAVE_DUR,1);
      var fadeOut=p>0.55?1-(p-0.55)/0.45:1;
      for(var i=0;i<N;i++){
        var b=particles[i];
        var t2=(elapsed-phaseStart)*b.waveSpd+b.waveOff;
        var wave=Math.sin(t2)*b.waveAmp*p;
        b.x+=b.waveDir*p*2.5;
        ctx.beginPath();ctx.arc(b.x,b.ty+wave,b.r*(1+p*0.6),0,Math.PI*2);
        ctx.fillStyle=b.color;ctx.globalAlpha=fadeOut*(0.4+Math.random()*0.6);ctx.fill();
      }
      ctx.globalAlpha=1;
      if(p>=1){
        phase=PHASE_DONE;
        var fd=null;
        function fadeScr(ts2){
          if(!fd)fd=ts2;
          var pp=Math.min((ts2-fd)/450,1);
          screen.style.opacity=1-pp;
          if(pp<1)requestAnimationFrame(fadeScr);
          else screen.style.display='none';
        }
        requestAnimationFrame(fadeScr);
      }
    }

    if(phase!==PHASE_DONE) requestAnimationFrame(animate);
  }

  document.getElementById('app').style.opacity='0';
  requestAnimationFrame(animate);

  setTimeout(function(){
    var app=document.getElementById('app');
    app.style.transition='opacity 0.9s ease';
    app.style.opacity='1';
  }, TOTAL+200);

})();
</script>
